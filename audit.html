<style>
:root { --void: #0a0a0f; --deep: #0f0f1a; --surface: rgba(15,15,26,0.8); --line: rgba(255,255,255,0.1); --line2: rgba(255,255,255,0.05); --sol-purple: #9945FF; --sol-green: #14F195; --sol-grad: linear-gradient(90deg, #9945FF, #14F195); --gold: #ffffff; --gold-lo: rgba(255,255,255,0.4); --gold-bd: rgba(255,255,255,0.15); --gold-bg: rgba(255,255,255,0.06); --lime: #14F195; --ink: #f0f0f0; --fog: rgba(240,240,240,0.45); --sans: 'DM Sans', sans-serif; --mono: 'Space Mono', monospace; --display: 'Bebas Neue', sans-serif; --t: 0.2s; --ease: ease-out; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--ink);font-family:var(--sans);height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='1'/%3E%3C/svg%3E");opacity:0.022;mix-blend-mode:overlay;}
.nav-back { position: absolute; top: 40px; left: 56px; color: var(--fog); text-decoration: none; font-family: var(--sans); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; transition: color var(--t); z-index: 10; }
.nav-back:hover { color: var(--ink); }
.box { background: var(--deep); border: 1px solid var(--line); border-radius: 4px; padding: 56px; max-width: 600px; width: 100%; position: relative; z-index: 5; margin: 0 24px; }
.b-title { font-family: var(--display); font-size: 40px; letter-spacing: 3px; margin-bottom: 24px; }
.b-status { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--gold); border: 1px solid var(--gold-bd); background: var(--gold-bg); display: inline-block; padding: 6px 16px; margin-bottom: 40px; text-transform: uppercase; }
.item { margin-bottom: 24px; }
.item-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2.5px; color: var(--fog); text-transform: uppercase; margin-bottom: 6px; }
.item-val { font-size: 15px; color: var(--ink); font-weight: 400; line-height: 1.6; }
.b-report { margin-top: 48px; border-top: 1px solid var(--line2); padding-top: 32px; }
.btn-ghost { background: none; cursor: default; border: 1px solid var(--line2); border-radius: 4px; color: var(--fog); font-family: var(--sans); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; padding: 10px 24px; display: inline-flex; align-items: center; }
.btn-ghost.active { cursor: pointer; color: var(--gold); border-color: var(--gold-bd); text-decoration: none; transition: all var(--t); }
.btn-ghost.active:hover { background: var(--gold-bg); transform: translateY(-2px); }
@media (max-width: 768px) { .nav-back { top: 24px; left: 24px; } .box { padding: 40px 24px; } .b-title { font-size: 32px; } }
</style>
