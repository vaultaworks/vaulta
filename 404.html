<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULTA — 404 Not Found</title>
<meta name="description" content="Page not found on Vaulta.">
<meta property="og:title" content="VAULTA — 404">
<meta property="og:image" content="https://vaulta.works/og-image.jpg">
<meta property="og:url" content="https://vaulta.works">
<meta property="og:type" content="website">
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root { --void: #000000; --deep: #080808; --surface: #111111; --line: rgba(255,255,255,0.1); --gold: #ffffff; --gold-lo: rgba(255,255,255,0.4); --lime: #39d98a; --ink: #f0f0f0; --fog: rgba(240,240,240,0.45); --sans: 'DM Sans', sans-serif; --mono: 'Space Mono', monospace; --display: 'Bebas Neue', sans-serif; --t: 0.2s; --ease: ease-out; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--ink);font-family:var(--sans);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='1'/%3E%3C/svg%3E");opacity:0.022;mix-blend-mode:overlay;}
.error-container { text-align: center; max-width: 600px; padding: 40px; position: relative; z-index: 10; }
.error-code { font-family: var(--display); font-size: 140px; line-height: 1; letter-spacing: 8px; color: var(--gold); position: relative; display: inline-block; margin-bottom: 8px; }
.error-code::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(57,217,138,0.2), transparent); transform: skewX(-20deg) translateX(-150%); animation: shimmer 4s infinite; }
@keyframes shimmer { 0% { transform: skewX(-20deg) translateX(-150%); } 50%, 100% { transform: skewX(-20deg) translateX(250%); } }
.error-title { font-family: var(--mono); font-size: 14px; letter-spacing: 4px; color: var(--gold-lo); margin-bottom: 24px; text-transform: uppercase; }
.error-desc { font-size: 16px; color: var(--fog); margin-bottom: 40px; line-height: 1.8; }
.btn-back { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--gold); border: 1px solid var(--line); border-radius: 4px; padding: 12px 32px; font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: all var(--t); }
.btn-back:hover { background: rgba(255,255,255,0.1); border-color: var(--gold-lo); transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="error-container">
    <div class="error-title">// ROUTE_NOT_FOUND</div>
    <div class="error-code">404</div>
    <div class="error-desc">The deployment or route you requested does not exist on the Vaulta network.</div>
    <a href="/" class="btn-back">← RETURN TO CORE</a>
  </div>
</body>
</html>
